<div class="row">
  <div class="col-12">
    <form>
      <div class="row">
        <div class="col-sm-5 form-group">
          <label for="name">Name</label>
          <input
            type="text"
            class="form-control"
            id="name"
            aria-describedby="helpId"
            placeholder=""
          />
        </div>
        <div class="col-sm-2 form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            class="form-control"
            id="amount"
            aria-describedby="helpId"
            placeholder=""
          />
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <button type="submit" class="btn btn-success m-1">Add</button>
          <button type="button" class="btn btn-danger m-1">Delete</button>
          <button type="button" class="btn btn-primary m-1">Clear</button>
        </div>
      </div>
    </form>
  </div>
</div>

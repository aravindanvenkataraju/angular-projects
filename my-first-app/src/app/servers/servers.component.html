<div class="form-group">
  <label for="serverName">Server Name</label>
  <input
    type="text"
    class="form-control"
    name="serverName"
    id=""
    aria-describedby="helpId"
    placeholder=""
    [(ngModel)]="serverName"
  />
  <!-- <small id="helpId" class="form-text text-muted">{{ serverName }}</small> -->
</div>

<button
  type="button"
  class="btn btn-primary"
  [disabled]="!allowNewServer"
  (click)="onServerCreated()"
>
  Add Server
</button>
<hr />
<p>{{ serverCreationStatus }}</p>
<hr />
